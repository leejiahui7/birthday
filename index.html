<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Birthday Wishes Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Karla:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#ffe4ef;--ink:#1a1612;--muted:#8a8070;--border:#d8d0c4;--radius:10px;--font-head:Georgia,'Times New Roman',serif;--font-body:'Karla',sans-serif;}
body{font-family:var(--font-body);background:var(--bg);color:var(--ink);min-height:100vh;padding:48px 20px 80px;display:flex;justify-content:center;}
.page{width:100%;max-width:640px;}
.hero{text-align:center;margin-bottom:44px;}
.hero-tag{display:inline-block;font-family:var(--font-head);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);border:1px solid var(--border);padding:5px 14px;border-radius:999px;margin-bottom:18px;}
.hero h1{font-family:Georgia,"Times New Roman",serif;font-size:clamp(30px,6vw,48px);font-weight:700;line-height:1.05;letter-spacing:-0.5px;margin-bottom:10px;}
.hero p{font-size:14px;color:var(--muted);font-weight:300;line-height:1.65;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
@media(max-width:460px){.form-row{grid-template-columns:1fr;}}
.field label{display:block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:500;margin-bottom:6px;}
.field input{width:100%;padding:11px 14px;background:#fff;border:1px solid var(--border);border-radius:var(--radius);font-family:var(--font-body);font-size:14px;color:var(--ink);outline:none;transition:border-color .18s;}
.field input:focus{border-color:#999;}
.field input::placeholder{color:#b0a898;}
.tabs-label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:500;margin-bottom:10px;}
.tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:24px;}
.tab{padding:7px 14px;border-radius:999px;border:1px solid var(--border);background:#fff;font-family:var(--font-body);font-size:13px;color:var(--muted);cursor:pointer;transition:all .18s;white-space:nowrap;}
.tab:hover{border-color:#aaa;color:var(--ink);}
.tab[data-tab="warm"].active{background:#fff5e6;border-color:#f5a623;color:#b07010;}
.tab[data-tab="genuine"].active{background:#eef4ee;border-color:#5a9060;color:#2e6035;}
.tab[data-tab="funny"].active{background:#fff0f5;border-color:#e05090;color:#a0205a;}
.tab[data-tab="geeky"].active{background:#eef0ff;border-color:#5060d0;color:#2030a0;}
.tab[data-tab="joyful"].active{background:#fffbe6;border-color:#d4a820;color:#8a6a00;}
.tab[data-tab="bold"].active{background:#f5eeff;border-color:#8840d0;color:#5010a0;}
.tab[data-tab="boring"].active{background:#f0f0ee;border-color:#888;color:#333;}
.gen-btn{width:100%;padding:15px;background:var(--ink);color:var(--bg);border:none;border-radius:var(--radius);font-family:var(--font-head);font-size:14px;font-weight:700;letter-spacing:.04em;cursor:pointer;transition:opacity .18s,transform .12s;margin-bottom:28px;}
.gen-btn:hover{opacity:.85;}
.gen-btn:active{transform:scale(.99);}
.output{background:#fff;border:1px solid var(--border);border-radius:14px;padding:28px;display:none;}
.output.show{display:block;animation:fadeUp .3s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.tone-chip{display:inline-block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:500;padding:4px 12px;border-radius:999px;margin-bottom:16px;}
.chip-warm{background:#fff5e6;color:#b07010;}
.chip-genuine{background:#eef4ee;color:#2e6035;}
.chip-funny{background:#fff0f5;color:#a0205a;}
.chip-geeky{background:#eef0ff;color:#2030a0;}
.chip-joyful{background:#fffbe6;color:#8a6a00;}
.chip-bold{background:#f5eeff;color:#5010a0;}
.chip-boring{background:#f0f0ee;color:#333;}
.wish-text{font-size:15px;line-height:1.82;color:#2a2420;font-weight:300;margin-bottom:20px;}
.wish-text p{margin-bottom:8px;}
.wish-text p:last-child{margin-bottom:0;}
.output-footer{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);padding-top:14px;}
.copy-btn{padding:7px 16px;border-radius:8px;border:1px solid var(--border);background:transparent;font-family:var(--font-body);font-size:12.5px;color:var(--muted);cursor:pointer;transition:all .18s;}
.copy-btn:hover{border-color:#aaa;color:var(--ink);}
.copy-btn.copied{border-color:#5a9060;color:#2e6035;background:#eef4ee;}
.hint{text-align:center;font-size:12.5px;color:#b0a898;font-style:italic;margin-top:16px;}
</style>
</head>
<body>
<div class="page">
  <div class="hero">
    <div class="hero-tag">Birthday Wishes Generator</div>
    <h1>Say it perfectly.<br>Every time.</h1>
    <p>Enter names, pick a vibe, and get the perfect birthday wish.</p>
  </div>
  <div class="form-row">
    <div class="field"><label>Their name</label><input type="text" id="theirName" placeholder="e.g. Jamie" maxlength="40"/></div>
    <div class="field"><label>Your name</label><input type="text" id="myName" placeholder="e.g. Alex" maxlength="40"/></div>
  </div>
  <p class="tabs-label">Pick a vibe</p>
  <div class="tabs">
    <button class="tab active" data-tab="warm">🌼 Warm &amp; Friendly</button>
    <button class="tab" data-tab="genuine">🌿 Genuine &amp; Grounded</button>
    <button class="tab" data-tab="funny">🔥 Funny &amp; Unhinged</button>
    <button class="tab" data-tab="geeky">🤖 Geeky &amp; Nerdy</button>
    <button class="tab" data-tab="joyful">✨ Joyful &amp; Optimistic</button>
    <button class="tab" data-tab="bold">⚡ Bold &amp; Progressive</button>
    <button class="tab" data-tab="boring">📋 Boring &amp; Boss-like</button>
  </div>
  <button class="gen-btn" id="genBtn">Generate birthday wish</button>
  <div class="output" id="output">
    <div class="tone-chip" id="toneChip"></div>
    <div class="wish-text" id="wishText"></div>
    <div class="output-footer">
      <button class="copy-btn" id="copyBtn">Copy to clipboard</button>
    </div>
  </div>
  <p class="hint" id="hint" style="display:none">Click again for a different version.</p>
</div>
<script>
const TEMPLATES = {
  warm:[
    "Wishing you the happiest of birthdays, {them}! You deserve all the joy, laughter, and love that this day brings. Cheers to you.\n\n— {me}",
    "{them}, birthdays were made for people like you — kind, wonderful, and worth celebrating. Hope today is as warm and lovely as you are.\n\n— {me}",
    "Happy birthday, {them}! May your day be filled with good food, great company, and all the things that make you smile.\n\n— {me}",
  ],
  genuine:[
    "{them}, another year, another chapter. I hope this one brings you more of what truly matters and less of what doesn't. Grateful to know you.\n\n— {me}",
    "Happy birthday, {them}. No fluff — just a genuine wish that this year is kinder, richer, and more you than the last.\n\n— {me}",
    "{them}, you're one of those people who make things better just by being around. Happy birthday — make it count.\n\n— {me}",
  ],
  funny:[
    "{them}, congratulations on surviving another lap around the sun without completely losing it. That alone deserves a cake. Happy birthday, you absolute legend.\n\n— {me}",
    "Happy birthday, {them}! You're not old, you're a limited edition vintage model. Gets better with age — or at least that's what we're telling people.\n\n— {me}",
    "{them}, I was going to write something deeply moving, but I spent the budget on your gift. You're welcome. Happy birthday!\n\n— {me}",
  ],
  geeky:[
    "{them}, you've completed another successful orbit around the sun with zero compiler errors. Impressive. Happy birthday!\n\n— {me}",
    "Happy birthday, {them}! You've levelled up once again. Stats look good, the quest log is full, and the best DLC is still ahead.\n\n— {me}",
    "{them}, as you increment your age variable by one today, may your RAM be plentiful, bugs be few, and birthday loot be legendary.\n\n— {me}",
  ],
  joyful:[
    "{them}, today is all about you — and the world is genuinely better with you in it! Wishing you the most joyful, beautiful birthday.\n\n— {me}",
    "Happy birthday, {them}!! May today overflow with everything that makes your heart light up. You deserve every single good thing.\n\n— {me}",
    "{them}, birthdays are proof the world got lucky the day you arrived. Here's to celebrating YOU — today and always!\n\n— {me}",
  ],
  bold:[
    "{them}, another year of growth, grit, and going your own way. Keep breaking moulds — the world needs more people who refuse to play small. Happy birthday.\n\n— {me}",
    "Happy birthday, {them}. You're not just getting older — you're getting sharper, bolder, and more unapologetically yourself. That's worth celebrating.\n\n— {me}",
    "{them}, the best version of you is still ahead. Keep moving. Happy birthday.\n\n— {me}",
  ],
  boring:[
    "Dear {them}, I would like to formally extend my warmest regards on the occasion of your birthday. May the year ahead meet or exceed expectations.\n\n— {me}",
    "Hi {them}, just a quick note to acknowledge your birthday and wish you a productive year ahead. Please let me know if there's anything I can action.\n\n— {me}",
    "{them}, as we mark this annual milestone, I wanted to recognise your continued existence and wish you all the best going forward.\n\n— {me}",
  ],
};

const CHIP={warm:"chip-warm",genuine:"chip-genuine",funny:"chip-funny",geeky:"chip-geeky",joyful:"chip-joyful",bold:"chip-bold",boring:"chip-boring"};
const LABEL={warm:"Warm & Friendly",genuine:"Genuine & Grounded",funny:"Funny & Unhinged",geeky:"Geeky & Nerdy",joyful:"Joyful & Optimistic",bold:"Bold & Progressive",boring:"Boring & Boss-like"};

let activeTab="warm", lastIndex=-1;

document.querySelectorAll(".tab").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    activeTab=btn.dataset.tab;
    lastIndex=-1;
  });
});

document.getElementById("genBtn").addEventListener("click",generate);
document.getElementById("copyBtn").addEventListener("click",()=>{
  const text=document.getElementById("wishText").innerText;
  navigator.clipboard.writeText(text).then(()=>{
    const cb=document.getElementById("copyBtn");
    cb.textContent="✓ Copied!";
    cb.classList.add("copied");
    setTimeout(()=>{cb.textContent="Copy to clipboard";cb.classList.remove("copied");},2500);
  });
});

function generate(){
  const them=document.getElementById("theirName").value.trim()||"Friend";
  const me=document.getElementById("myName").value.trim()||"Me";
  const pool=TEMPLATES[activeTab];
  let idx;
  do{idx=Math.floor(Math.random()*pool.length);}while(idx===lastIndex&&pool.length>1);
  lastIndex=idx;
  const wish=pool[idx].replace(/{them}/g,them).replace(/{me}/g,me);
  const chip=document.getElementById("toneChip");
  chip.textContent=LABEL[activeTab];
  chip.className="tone-chip "+CHIP[activeTab];
  const wishDiv=document.getElementById("wishText");
  wishDiv.innerHTML="";
  wish.split("\n").forEach(line=>{
    if(line.trim()===""){wishDiv.appendChild(document.createElement("br"));return;}
    const p=document.createElement("p");
    p.textContent=line;
    wishDiv.appendChild(p);
  });
  document.getElementById("output").classList.add("show");
  document.getElementById("hint").style.display="block";
}
</script>
</body>
</html>
